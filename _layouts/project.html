<!doctype html>
<html lang="en" class="h-full">
  {% include head.html %}

  <body class="h-full">
    <!-- Full-height container for project content -->
    <div class="min-h-full">
      <!-- Minimal header with back to site link -->
      <div class="bg-white border-b border-gray-200 px-4 py-3">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
          <div>
            <a href="{{ site.baseurl }}/" class="text-sm text-gray-600 hover:text-gray-900 flex items-center">
              <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
              </svg>
              Back to {{ site.title }}
            </a>
          </div>
          <div class="text-sm text-gray-500">
            Project: {{ page.title }}
          </div>
        </div>
      </div>

      <!-- Project content -->
      <div class="project-content">
        {{ content }}
      </div>
    </div>

    <!-- No additional scripts needed since the project includes its own -->
  </body>
</html>
