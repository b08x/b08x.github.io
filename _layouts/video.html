<html>
<style>
  @color: #2ecc71;

  .mask {
    position: absolute;
    right: 0;
    bottom: 0;
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 0 0 100px 100px;
    border-color: transparent transparent rgba(46, 204, 113, 0.2) transparent;
    z-index: 999;
  }

  .main-container {
    position: relative;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding: 20px;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  .main {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  .side-container {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: 400px;
    height: 100%;
    background: #f0f0f0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 999;
  }

  .side-container h1 {
    text-align: center;
    padding-top: 100px;
    color: #ea7f4d;
    font-family: inherit;
  }

  .side-container p {
    text-align: center;
    width: 80%;
    margin: 0 auto;
    color: #333;
    font-family: inherit;
    margin-bottom: 20px;
  }

  .side-container a {
    color: #333;
  }

  // General Style
  html,
  body {
    height: 100%;
    overflow: hidden;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
</style>

<body>
  <div class="main-container" {% if page.poster %}style="background-image: url('{{ page.poster }}');"{% endif %}>
    <div class="main">
      {% if page.video %}
        <video autoplay loop muted>
          <source src="{{ page.video.webm}}" type="video/webm" />
          <source src="{{ page.video.mp4 }}" type="video/mp4" />
        </video>
      {% endif %}
    </div>
    <div class="side-container">
      <h1>notebookLLM</h1>
      {{ content }}
    </div>
  </div>
</body>

</html>
