<html>
  <style>
    @color: #2ecc71;

    .mask {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 0 0 100px 100px;
      border-color: transparent transparent rgba(46, 204, 113, 0.2) transparent;
      z-index: 999;
    }
    video {
      position: fixed;
      left: 0;
      top: 0;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      z-index: -100;
      background-size: cover;
    }

    // General Style
    html,
    body {
      height: 100%;
      overflow: hidden;
    }
  </style>
  <body>
    <video autoplay loop muted>
      <source src="https://vjs.zencdn.net/v/oceans.webm" type="video/webm" />
      <source src="https://vjs.zencdn.net/v/oceans.mp4" type="video/mp4" />
    </video>

    <div class="container">
      <p>hey!</p>
    </div>
  </body>
</html>
