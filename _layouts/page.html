---
layout: default
---

<div class="row-flex-column">
  <div class="col-md">
    <h1>{{ page.title }}</h1>
    <time datetime="{{ page.last_modified_at | date_to_xmlschema }}">{% if page.type != 'pages' %}
      Last updated on {{ page.last_modified_at | date: "%B %-d, %Y" }}
      {% endif %}
    </time>
  </div>

<hr>
  <div class="col-md">
    <content>
      {{ content }}
    </content>
  </div>
</div>
