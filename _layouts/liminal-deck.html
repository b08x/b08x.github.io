<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — {{ site.title }}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS Only (Bypassing styles.css to prevent bleed) -->
  <link rel="stylesheet" href="{{ '/assets/css/compiled.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  
  {% if page.custom_css %}
  {% for style in page.custom_css %}
  <link rel="stylesheet" href="{{ style | relative_url }}">
  {% endfor %}
  {% endif %}

  <!-- Essential JS for theme and islands -->
  <script>
    (function () {
      // Force dark mode for liminal deck
      document.documentElement.classList.add('dark');
      window.__SYNC_NOTES_QUEUE__ = [];
      window.__SYNC_NOTES_DISPATCH__ = function (eventName, detail, target = window) {
        const event = new CustomEvent(eventName, { detail });
        target.dispatchEvent(event);
      };
      window.__SYNC_NOTES_OBSERVERS__ = [];
      window.__SYNC_NOTES_ROOTS__ = new Map();
    })();
  </script>
</head>

<body class="m-0 p-0 bg-liminal-bg text-white selection:bg-accent/30 antialiased overflow-hidden">

  <!-- React Island Mount Point -->
  {%- capture placeholder -%}
    <div class="font-mono text-xs tracking-widest text-white/20 animate-pulse">
      INITIALIZING_LIMINAL_DECK...
    </div>
  {%- endcapture -%}
  {%- include island.html name="LiminalDeckIsland" props=page.slides id="liminal-deck-root" class="min-h-screen" placeholder=placeholder -%}

  <!-- Island Hydration Script -->
  <script src="{{ '/assets/js/dist/garden-widgets-v2.js' | relative_url }}" defer></script>

</body>
</html>
