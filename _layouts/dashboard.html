---
layout: base-shell
---

<div class="bg-background text-foreground font-sans w-full h-full">
    <div class="max-w-content-2col mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <!-- React Island Container -->
        <!-- 'data-island' matches the key in src/main.tsx components object -->
        <!-- 'data-title' and 'data-description' are passed as props -->
        <div data-island="DashboardIsland" 
             data-title="{{ page.title }}" 
             data-description="{{ page.description }}"
             class="animate-fade-in min-h-[500px]">

            <!-- Loading Fallback (matches IDE aesthetic) -->
            <div class="space-y-6">
                <div class="h-16 border-b border-border bg-surface/50"></div>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="h-24 bg-surface border border-border animate-pulse"></div>
                    <div class="h-24 bg-surface border border-border animate-pulse"></div>
                    <div class="h-24 bg-surface border border-border animate-pulse"></div>
                    <div class="h-24 bg-surface border border-border animate-pulse"></div>
                </div>
                <div class="grid grid-cols-3 gap-6 h-64">
                    <div class="col-span-2 bg-surface border border-border animate-pulse"></div>
                    <div class="bg-surface border border-border animate-pulse"></div>
                </div>
            </div>
        </div>

        <!-- Static Content Injection -->
        <div class="mt-12 prose prose-invert prose-code:font-mono max-w-none border-t border-border pt-8">
            {{ content }}
        </div>

    </div>
</div>
