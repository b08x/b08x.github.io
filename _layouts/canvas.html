<!DOCTYPE html>
<html lang="en">
  <style>
    #flow {
      width: 480px;
      height: 480px;
    }
  </style>
  {% include head-jcanvas.html %}

  <body id="home" style="--scale: 1; --pan-x: 0px; --pan-y: 0px">
    <div id="container">
      <div id="canvas-container">
        <svg id="canvas-edges">
          <defs>
            <marker
              id="arrowhead"
              markerWidth="10"
              markerHeight="8"
              refX="10"
              refY="4"
              orient="auto"
            >
              <polygon points="0 0, 10 4, 0 8" />
            </marker>
          </defs>
          <g id="edge-paths"></g>
        </svg>

        <div id="canvas-nodes">
          <node
            id="logo"
            class="node node-file"
            data-node-type="file"
            data-node-file="logo.svg"
            style="left: 1px; top: 88px"
          >
            <div class="node-name">logo.svg</div>
            <img
              width="500"
              height="500"
              src="/assets/img/llm/image02.jpeg"
              alt="JSON Feed"
            />
          </node>

          <node
            id="nav"
            class="node node-text"
            data-node-type="text"
            style="left: 405px; top: 112px"
          >
            <div class="node-name"></div>
            <div class="node-text-content">
              <p>Sources</p>
              <ul>
                {% for link in page.links %}
                <li><a href="{{ link.url }}">{{ link.name }}</a></li>
                {% endfor %}
              </ul>
            </div>
          </node>

          <node
            id="spec"
            class="node node-link"
            data-node-type="file"
            data-node-file="_notes/NLP/text-processing/Chunk-Analyser.md"
            style="left: 811px; top: 686px"
          >
            <div class="node-name">Idiom-Illuminator</div>
            <iframe width="100%" height="100%" src="{{ page.sections[0]}}">
            </iframe>
          </node>

          <node
            id="flow"
            class="node node-link"
            data-node-type="file"
            data-node-file="dev/Idiom-Illuminator.md"
            style="left: 880px; top: 85px"
          >
            <div class="node-name">git-flow</div>
            <iframe
              width="100%"
              height="100%"
              src="/dev/Idiom-Illuminator?hidenav=true"
            >
            </iframe>
          </node>

          <node
            id="readme"
            class="node node-link"
            data-node-type="file"
            data-node-file="readme.md"
            style="left: 3px; top: 440px"
          >
            <div class="node-name">readme</div>
            {{ content }}
          </node>
        </div>

        <div id="output" class="theme-dark hidden">
          <div class="code-header">
            <span class="language">JSON&nbsp;Canvas</span>
            <span class="close-output">×</span>
          </div>
          <div id="output-code">
            <pre><code class="language-json" id="positionsOutput"></code></pre>
          </div>
          <div class="code-footer">
            <button class="button-copy">Copy code</button>
            <button class="button-download">Download file</button>
          </div>
        </div>

        <div id="controls">
          <div id="zoom-controls">
            <button id="toggleOutput">Toggle output</button>
            <button id="zoom-out">Zoom out</button>
            <button id="zoom-in">Zoom in</button>
            <button id="zoom-reset">Reset</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      let edges = [
        {
          id: "edge-spec-readme",
          fromNode: "spec",
          fromSide: "left",
          fromEnd: "none",
          toNode: "readme",
          toSide: "right",
          toEnd: "arrow",
        },
        {
          id: "edge-nav-flow",
          fromNode: "nav",
          fromSide: "right",
          fromEnd: "none",
          toNode: "flow",
          toSide: "left",
          toEnd: "arrow",
        },
        {
          id: "edge-flow-spec",
          fromNode: "flow",
          fromSide: "bottom",
          fromEnd: "none",
          toNode: "spec",
          toSide: "top",
          toEnd: "none",
        },
      ];
    </script>

    <script src="{{ site.baseurl }}/assets/js/canvas.js"></script>
    <script src="{{ site.baseurl }}/assets/js/prism.js"></script>
  </body>
</html>
