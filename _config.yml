title: syncopated notes

wiki_page_generator:
  enabled: false

exclude:
  - .gitignore
  - .containerignore
  - .rubocop.yml
  - .rubocop_todo.yml
  - .ruby-gemset
  - .ruby-version
  - AGENTS.md
  - b08x.github.io.code-workspace
  - bin
  - cliff.toml
  - Containerfile
  - docker-compose.yml
  - Gemfile
  - Gemfile.lock
  - implement/
  - LICENSE
  - logs/
  - node_modules
  - package-lock.json
  - postcss.config.js
  - README.md
  - refactor/
  - scripts/
  - pages/AGENTS.md
  - backlog.md
  - CHANGELOG.md
  - CLAUDE.md
  - GEMINI.md
  - package.json
  - tailwind.config.js
  - tsconfig.json
  - src/
  - graph.json
  - homepage-canvas.json
# You may need to change the base URL depending on your deploy configuration.
baseurl: ""

# If you are using a host that cannot resolve URLs that do
# not end with .html (such as Neocities), set this to 'true'.
use_html_extension: false

# Set to `true` to open non-internal links in new tabs, or
# set to `false` to open non-internal links in current tab.
open_external_links_in_new_tab: true

# External link security configuration (jekyll-link-attributes)
external_links:
  enabled: true
  rel: noopener noreferrer
  target: _blank
  exclude:

# Set to `true` to replace tweet URLs with Twitter embeds.
# Note that doing so will negatively the reader's privacy
# as their browser will communicate with Twitter's servers.
embed_tweets: false

permalink: pretty
relative_permalinks: false

plugins:
  - jekyll-last-modified-at
  - jekyll-feed
  - jekyll-jupyter-notebook
  - jekyll-link-attributes
  - jekyll-paginate-v2
  - jekyll-pandoc
  - jekyll-sass-converter
  - jekyll-sitemap
  - jekyll-spaceship
  - jekyll-tabs
  - jekyll-toc
  - jekyll-optional-front-matter

sass:
  sass_dir: _sass
  style: compressed

picture:
  source: "assets/img"
  output: "assets/img/generated"
  suppress_warnings: true
  nomarkdown: false

collections:
  notes:
    output: true
    permalink: /notes/:slug
  projects:
    output: true
    permalink: /projects/:slug
  prompts:
    output: true
    permalink: /prompts/:slug
  wikis:
    output: true
    permalink: /wikis/:slug
  slides:
    output: true
    permalink: /slides/:path

# Default layout for all pages
defaults:
  - scope:
      path: ""
    values:
      layout: "page"
  - scope:
      path: "**/AGENTS.md"
    values:
      layout: null
  - scope:
      path: "assets/css/**/*"
    values:
      layout: null
  - scope:
      path: "_notes"
    values:
      layout: "note"
