title: Syncopated Notes
include:
  - "_pages"
  - "_projects"
  - "_articles"
exclude:
  - "textgenerator/"
  - "_templates/"
  - "_drafts/"
  - "_includes/notes_graph.json"
  - ".obsidian/"
  - "*.cast"
  - "*.ipynb"
  - "*.pdf"
  - "README.md"
  - "LICENSE"
  - "*.txt"
  - "*.canvas"
  - "index.something"
# You may need to change the base URL depending on your deploy configuration.
baseurl: ""

github:
  uid: b08x

plugins:
  - jekyll-last-modified-at
  - jekyll-jupyter-notebook
  - jekyll_asciinema
  - jekyll-spaceship
  - jekyll_picture_tag
  - jekyll-toc
  - jekyll-paginate

# If you are using a host that cannot resolve URLs that do
# not end with .html (such as Neocities), set this to 'true'.
use_html_extension: false

# Set to `true` to open non-internal links in new tabs, or
# set to `false` to open non-internal links in current tab.
open_external_links_in_new_tab: true

# Set to `true` to replace tweet URLs with Twitter embeds.
# Note that doing so will negatively the reader's privacy
# as their browser will communicate with Twitter's servers.
embed_tweets: false

permalink: pretty
relative_permalinks: false

# Pagination Settings
pagination:
  enabled: true
  per_page: 2
  permalink: '/page/:num/'
  title: ' - page :num'
  limit: 0
  sort_field: 'date'
  sort_reverse: true

sass:
  sass_dir: _sass
  style: compressed

collections:
  notes:
    output: true
    permalink: /:title
  articles:
    output: true
    permalink: /:title


defaults:
  - scope:
      path: "**/*"
    values:
      layout: "default"
  - scope:
      path: "_notes/**/*.md"
    values:
      layout: "note"
  - scope:
      path: "_articles/**/*.md"
    values:
      layout: "article"

jekyll-spaceship:
  mermaid-processor:
    css:
      class: "mermaid!"
    config:
      theme: dark

picture:
  source: "assets/img"
  output: "assets/img/generated"
  suppress_warnings: true
  nomarkdown: false

toc:
  min_level: 1
  max_level: 6
  ordered_list: false
  no_toc_section_class: no_toc_section
  list_id: toc
  list_class: section-nav
  sublist_class: ''
  item_class: toc-entry
  item_prefix: toc-
