title: b08x
baseurl: ""
url: "https://b08x.github.io"

name: Robert Pannick
tagline: Senior Linux Systems Engineer
pic: profile.png

email: rwpannick@gmail.com
phone: 614 653 8241
github_username: b08x

plugins:
  - jekyll-last-modified-at
  - jekyll-jupyter-notebook
  - jekyll_asciinema
  - jekyll-spaceship
  - jekyll_picture_tag
  - jekyll-toc
  - jekyll-paginate-v2
  - jekyll-feed
  - jekyll-pandoc
  - jekyll-react-player

include:
  - "_notes/"
  - "_pages/"
  - "_posts/"
  - "_projects/"
exclude:
  - Gemfile
  - Gemfile.lock
  - Vagrantfile
  - .vagrant
  - LICENSE
  - .asset-cache
  - .sass-cache
  - Rakefile
  - README.md
  - .claude/
  - .github/
  - .qodo/
  - .jekyll-cache/
  - CLAUDE.md



# If you are using a host that cannot resolve URLs that do
# not end with .html (such as Neocities), set this to 'true'.
use_html_extension:  false

# Set to `true` to open non-internal links in new tabs, or
# set to `false` to open non-internal links in current tab.
open_external_links_in_new_tab: true

# Set to `true` to replace tweet URLs with Twitter embeds.
# Note that doing so will negatively the reader's privacy
# as their browser will communicate with Twitter's servers.
embed_tweets: false

permalink: pretty
relative_permalinks: false

sass:
  style: compressed

picture:
  source: "assets/img"
  output: "assets/img/generated"
  suppress_warnings: true
  nomarkdown: false

# Collections
collections:
  notes:
    output: true
    permalink: /:collection/:path
  projects:
    output: true
    permalink: /:collection/:path

# Defaults
defaults:
  - scope:
      path: "_posts/**/*.md"
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: "_notes/**/*.md"
    values:
      layout: "note"
  - scope:
      path: "_pages/**/*.md"
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: "_projects/**/*.md"
      type: "pages"
    values:
      layout: "project"


jekyll-spaceship:
  mermaid-processor:
    css:
      class: "mermaid!"
    config:
      theme: dark

markdown: kramdown

# Pagination Settings
pagination:
  enabled: true
  per_page: 10
  permalink: '/page/:num/'
  title: ' - page :num'
  limit: 0
  sort_field: 'date'
  sort_reverse: false
  collection: 'notes'

