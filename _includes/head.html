<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">

  <link href="https://fonts.googleapis.com/css?family=Inconsolata|Lora" rel="stylesheet">

  <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/octicons/2.0.2/octicons.min.css">
  
  <link rel="stylesheet" href="{{ '/assets/css/vendor/bootstrap/bootstrap.css' | relative_url }}">

  <link rel="stylesheet" href="{{ '/assets/css/vendor/font-awesome/fontawesome.css' | relative_url }}">

  <link rel="stylesheet" href="{{ '/assets/css/vendor/github-calendar.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/vendor/github-activity.css' | relative_url }}">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  <link rel="stylesheet" href="{{ '/assets/css/notebook.css' | relative_url }}">


  <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title | escape }}" href="{{ "/feed.xml" | relative_url }}">

  {% if jekyll.environment == 'production' and site.google_analytics %}
  {% include google-analytics.html %}
  {% endif %}

</head>
