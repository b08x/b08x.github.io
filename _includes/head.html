<head>
  <meta charset="UTF-8">

  <link rel="canonical" href="{{ site.url }}{{ page.url }}" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description"
    content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.title }}{% endif %}">

  <meta property="og:site_name" content="{{ site.title }}">

  <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgo=">

  <link rel="stylesheet" href="{{ site.baseurl }}/styles.css">
  <link rel="stylesheet" href="{{ '/assets/css/compiled.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  <link rel="stylesheet"
    href="{{ '/assets/js/dist/garden-widgets-v2.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  <link rel="stylesheet" href="{{ site.url }}/assets/css/jcanvas/style.css" type="text/css">
  <link rel="stylesheet" href="{{ site.url }}/assets/css/react-photo-view-overrides.css" type="text/css">

  <script>
    (function () {
      const theme = localStorage.getItem('preferred-theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      if (theme === 'dark') document.documentElement.classList.add('dark');

      // Epic 2: Deterministic State Management & Event Orchestration
      window.__SYNC_NOTES_QUEUE__ = [];
      window.__SYNC_NOTES_DISPATCH__ = function (eventName, detail, target = window) {
        const event = new CustomEvent(eventName, { detail });
        // If target is an island, check if it's hydrated
        if (target instanceof HTMLElement && target.hasAttribute('data-island')) {
          if (target.getAttribute('data-mounted') === 'true') {
            target.dispatchEvent(event);
          } else {
            window.__SYNC_NOTES_QUEUE__.push({ target, eventName, detail });
          }
        } else {
          // If target is window or other global, just dispatch
          target.dispatchEvent(event);
        }
      };

      // Epic 3: Garbage Collection & Observer Lifecycle Management
      window.__SYNC_NOTES_OBSERVERS__ = [];
      window.__SYNC_NOTES_ROOTS__ = new Map(); // island container -> React root

      window.teardownIslands = function () {
        console.log(`[Garden] Teardown: Cleaning up ${window.__SYNC_NOTES_ROOTS__.size} islands and ${window.__SYNC_NOTES_OBSERVERS__.length} observers`);

        // 1. Disconnect all observers
        window.__SYNC_NOTES_OBSERVERS__.forEach(obs => {
          if (obs && typeof obs.disconnect === 'function') {
            obs.disconnect();
          }
        });
        window.__SYNC_NOTES_OBSERVERS__ = [];

        // 2. Unmount all React roots
        window.__SYNC_NOTES_ROOTS__.forEach((root, container) => {
          try {
            root.unmount();
            container.removeAttribute('data-mounted');
          } catch (e) {
            console.warn('[Garden] Failed to unmount island root:', e);
          }
        });
        window.__SYNC_NOTES_ROOTS__.clear();

        // 3. Clear event queue
        window.__SYNC_NOTES_QUEUE__ = [];
      };

      // Hook into page lifecycle (Generic popstate as fallback for PJAX/Turbolinks)
      window.addEventListener('popstate', window.teardownIslands);
    })();
  </script>
  <script src="{{ '/assets/js/theme-manager.js' | relative_url }}"></script>

  {% if page.excerpt %}
  <meta property="og:description" content="{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}" />
  {% else %}
  <meta property="og:description" content="{{ site.title | strip_html | strip_newlines | truncate: 160 }}" />
  {% endif %}

  {% if page.title %}
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:type" content="article">
  {% else %}
  <meta property="og:title" content="{{ site.title }}">
  <meta property="og:type" content="website">
  {% endif %}

  {% if page.date %}
  <meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">
  <meta property="article:author" content="{{ site.url }}/">
  {% endif %}

  <meta property="og:url" content="{{ site.url }}{{ page.url }}" />

  {% if page.image %}
  <meta property="og:image" content="{{ site.url }}{{ page.image }}">
  {% endif %}

  <title>
    {% if page.id == "home" %}
    {{ site.title }}
    {% else %}
    {{ page.title }} &mdash; {{ site.title }}
    {% endif %}
  </title>
</head>
