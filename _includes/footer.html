<footer class="row">
  <div>
    <a class="internal-link" href="{{ site.baseurl }}/"><b>Home</b></a> |
    {% if site.github.uid %}
    <a href="https://github.com/{{ site.github.uid }}" class="socialinks__entry" target="_blank">
      github
      <i class="fa fa-github"></i>
    </a>
    {% endif %}
  </div>
  <time datetime="{{ page.last_modified_at | date_to_xmlschema }}">{% if page.type != 'pages' %}
    <div class="xs">
      updated on: {{ page.last_modified_at | date: "%B %-d, %Y" }}
    </div>
    {% endif %}
  </time>

</footer>
