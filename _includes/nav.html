<div>
    <a class="internal-link" href="{{ site.baseurl }}/"><b>{{ site.title }}</b></a> | 
    {% for note in site.notes %}
    {% if note.layout == 'folder' %}
    <a class="internal-link" href="{{ site.baseurl }}{{ note.url }}"><b>{{ note.title }}</b></a>
    {% endif %}
    {% endfor %}    

</div>
