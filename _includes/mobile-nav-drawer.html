<!-- Mobile Navigation Drawer (visible only on xl:hidden screens) -->
<button id="mobile-nav-trigger"
  class="xl:hidden fixed bottom-6 left-6 z-40 p-3 bg-accent text-white rounded-full shadow-lg hover:bg-accent/90 transition-all"
  aria-label="Open navigation menu"
  aria-expanded="false"
  aria-controls="mobile-nav-drawer">
  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
  </svg>
</button>

<dialog id="mobile-nav-drawer"
  class="xl:hidden fixed inset-0 z-50 bg-transparent backdrop:bg-black/50 p-0 m-0 w-full max-w-xs h-full"
  aria-label="Mobile navigation">

  <div class="bg-background h-full overflow-y-auto border-r border-border shadow-2xl">
    <!-- Drawer Header -->
    <div class="sticky top-0 z-10 flex items-center justify-between px-6 py-4 bg-background border-b border-border">
      <h2 class="text-lg font-bold text-foreground">Navigation</h2>
      <button id="mobile-nav-close"
        class="p-2 text-foreground/70 hover:text-accent transition-colors rounded-md hover:bg-surface"
        aria-label="Close navigation menu">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Drawer Content (inject left sidebar content) -->
    <div id="mobile-nav-content" class="px-6 py-6">
      <!-- Content dynamically populated from left sidebar -->
    </div>

    <!-- SearchCmdK Access (optional enhancement) -->
    <div class="px-6 py-4 border-t border-border">
      <button onclick="window.dispatchEvent(new CustomEvent('open-search'))"
        class="w-full px-4 py-2 text-sm text-left bg-surface hover:bg-surface/70 border border-border rounded-md transition-colors flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <span>Search...</span>
        <kbd class="ml-auto px-2 py-0.5 text-xs bg-background border border-border rounded">⌘K</kbd>
      </button>
    </div>
  </div>
</dialog>

<script>
  (function() {
    const trigger = document.getElementById('mobile-nav-trigger');
    const drawer = document.getElementById('mobile-nav-drawer');
    const closeBtn = document.getElementById('mobile-nav-close');
    const drawerContent = document.getElementById('mobile-nav-content');
    const leftSidebar = document.getElementById('left-sidebar');

    if (!trigger || !drawer || !leftSidebar) return;

    // Clone left sidebar content into drawer
    const clonedContent = leftSidebar.querySelector('div').cloneNode(true);
    clonedContent.classList.remove('sticky', 'top-20', 'h-[calc(100vh-theme(spacing.20))]', 'overflow-y-auto');
    drawerContent.appendChild(clonedContent);

    // Open drawer
    trigger.addEventListener('click', () => {
      drawer.showModal();
      trigger.setAttribute('aria-expanded', 'true');
      // Focus trap: focus the close button
      closeBtn.focus();
    });

    // Close drawer
    function closeDrawer() {
      drawer.close();
      trigger.setAttribute('aria-expanded', 'false');
      trigger.focus(); // Return focus to trigger
    }

    closeBtn.addEventListener('click', closeDrawer);

    // Close on backdrop click
    drawer.addEventListener('click', (e) => {
      const rect = drawer.getBoundingClientRect();
      if (
        e.clientX < rect.left ||
        e.clientX > rect.right ||
        e.clientY < rect.top ||
        e.clientY > rect.bottom
      ) {
        closeDrawer();
      }
    });

    // Close on Escape key
    drawer.addEventListener('cancel', (e) => {
      closeDrawer();
    });

    // Accessibility: Trap focus within drawer when open
    drawer.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        const focusableElements = drawer.querySelectorAll('a, button, input, [tabindex]:not([tabindex="-1"])');
        const firstElement = focusableElements[0];
        const lastElement = focusableElements[focusableElements.length - 1];

        if (e.shiftKey && document.activeElement === firstElement) {
          e.preventDefault();
          lastElement.focus();
        } else if (!e.shiftKey && document.activeElement === lastElement) {
          e.preventDefault();
          firstElement.focus();
        }
      }
    });
  })();
</script>

<style>
  /* Dialog styling for slide-in animation */
  #mobile-nav-drawer {
    animation: slideIn 0.3s ease-out;
    transition: opacity 0.3s ease-out;
  }

  #mobile-nav-drawer[open] {
    display: block;
  }

  #mobile-nav-drawer::backdrop {
    animation: fadeIn 0.3s ease-out;
  }

  @keyframes slideIn {
    from {
      transform: translateX(-100%);
      opacity: 0;
    }
    to {
      transform: translateX(0);
      opacity: 1;
    }
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
    }
    to {
      opacity: 1;
    }
  }

  /* Ensure drawer is left-aligned */
  #mobile-nav-drawer {
    left: 0;
    right: auto;
    margin: 0;
  }
</style>
