# Theme Configuration for Dark/Light Mode Support

themes:
  light:
    name: "Light"
    icon: "☀️"
    colors:
      # Background colors (infographic palette)
      bg_primary: "#ffffff"       # white for cards and content
      bg_secondary: "#f0f4f8"     # soft blue-gray main background
      bg_tertiary: "#e0e7ff"      # light blue for special sections
      
      # Text colors (infographic palette)
      text_primary: "#003f5c"     # dark blue for main text
      text_secondary: "#665191"   # purple for secondary text
      text_tertiary: "#94a3b8"    # muted gray for tertiary text
      text_muted: "#cbd5e1"       # very light gray for muted text
      
      # Border and accent colors (infographic palette)
      border_primary: "#e2e8f0"   # light gray borders
      border_secondary: "#cbd5e1" # slightly darker borders
      accent_primary: "#d45087"   # pink/rose for main accents
      accent_hover: "#f95d6a"     # coral for hover states
      accent_secondary: "#665191" # purple for secondary accents
      accent_tertiary: "#ffa600"  # orange for highlights
      
      # Header specific
      header_bg: "#ffffff"
      header_text: "#003f5c"      # dark blue
      header_border: "rgba(0, 63, 92, 0.1)" # dark blue with opacity
      
      # Sidebar specific
      sidebar_bg: "#ffffff"
      sidebar_text: "#003f5c"     # dark blue
      
      # Code and syntax highlighting
      code_bg: "#f0f4f8"          # soft blue-gray background
      code_text: "#003f5c"        # dark blue text
      
  dark:
    name: "Dark"
    icon: "🌙"
    colors:
      # Background colors
      bg_primary: "#0f172a"       # slate-900
      bg_secondary: "#1e293b"     # slate-800
      bg_tertiary: "#334155"      # slate-700
      bg_gradient_start: "#0f172a" # gradient start
      bg_gradient_end: "#1e293b"   # gradient end
      
      # Text colors
      text_primary: "#f8fafc"     # slate-50
      text_secondary: "#cbd5e1"   # slate-300
      text_tertiary: "#94a3b8"    # slate-400
      text_muted: "#64748b"       # slate-500
      
      # Border and accent colors
      border_primary: "#334155"   # slate-700
      border_secondary: "#475569" # slate-600
      accent_primary: "#3b82f6"   # blue-500 for consistency
      accent_hover: "#60a5fa"     # blue-400 for hover (lighter for dark theme)
      accent_secondary: "#22d3ee" # cyan-400 for gradients (lighter for dark)
      accent_tertiary: "#38bdf8"  # sky-400 for gradient variations
      
      # Header specific
      header_bg: "#1e293b"
      header_text: "#f8fafc"
      header_border: "rgba(255, 255, 255, 0.1)"
      
      # Sidebar specific
      sidebar_bg: "#1e293b"
      sidebar_text: "#f8fafc"
      
      # Code and syntax highlighting
      code_bg: "#334155"
      code_text: "#e2e8f0"
      
  auto:
    name: "Auto"
    icon: "🔄"
    description: "Follow system preference"

# Default theme (used when no preference is stored)
default_theme: "light"

# Enable automatic system theme detection
enable_system_theme: true

# Theme transition duration (CSS)
transition_duration: "0.3s"

# Enable theme persistence in localStorage
enable_persistence: true